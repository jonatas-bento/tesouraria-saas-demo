<aside class="sidebar" [class.open]="sidebarOpen()">
  <div class="sidebar-header">
    <h2 class="sidebar-title">Portal Demo</h2>
    <button
      class="sidebar-close"
      (click)="closeSidebar()"
      aria-label="Fechar menu"
    >
      ✕
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="sidebar-section">
      <span class="sidebar-section-title">Tesouraria</span>

      <a
        routerLink="/demo/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar-link"
        (click)="closeSidebar()"
      >
        <span class="sidebar-icon">📊</span>
        <span class="sidebar-text">Dashboard</span>
      </a>

      <a
        routerLink="/demo/entradas"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar-link"
        (click)="closeSidebar()"
      >
        <span class="sidebar-icon">💰</span>
        <span class="sidebar-text">Entradas</span>
      </a>

      <a
        routerLink="/demo/despesas"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar-link"
        (click)="closeSidebar()"
      >
        <span class="sidebar-icon">💳</span>
        <span class="sidebar-text">Despesas</span>
      </a>

      <a
        routerLink="/demo/lotes-conferencia"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar-link highlight"
        (click)="closeSidebar()"
      >
        <span class="sidebar-icon">🧾</span>
        <span class="sidebar-text">Lotes de Conferência</span>
      </a>

      <a
        routerLink="/demo/balancete"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar-link"
        (click)="closeSidebar()"
      >
        <span class="sidebar-icon">📈</span>
        <span class="sidebar-text">Balancete</span>
      </a>

      <a
        routerLink="/demo/relatorios"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar-link"
        (click)="closeSidebar()"
      >
        <span class="sidebar-icon">📄</span>
        <span class="sidebar-text">Relatórios</span>
      </a>
    </div>

    <div class="sidebar-section">
      <span class="sidebar-section-title">Secretaria</span>

      <a
        routerLink="/demo/membros"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar-link"
        (click)="closeSidebar()"
      >
        <span class="sidebar-icon">👥</span>
        <span class="sidebar-text">Membros</span>
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <a routerLink="/" class="sidebar-link-back">
      <span class="sidebar-icon">🏠</span>
      <span class="sidebar-text">Voltar ao Site</span>
    </a>
  </div>
</aside>

<div
  class="sidebar-overlay"
  [class.visible]="sidebarOpen()"
  (click)="closeSidebar()"
></div>
